name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate package-lock.json sync
        run: node validate-lockfile.js

      - name: Install dependencies
        run: npm ci

      # Lint is informational for now: there are ~25 pre-existing
      # @typescript-eslint/no-explicit-any errors in test files. Cleaning
      # them up is its own follow-up; until then, surface them in the run
      # log without blocking the deploy.
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: kinetic-object-322814
          target: matty-notes-pwa
          channelId: live
